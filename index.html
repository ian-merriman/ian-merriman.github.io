<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ian Merriman | Aerospace Engineering Portfolio</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card-light: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.15);
      --border: rgba(148, 163, 184, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      width: min(1100px, 92%);
      margin: 0 auto;
    }

    header {
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.95);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
    }

    .logo {
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      list-style: none;
      font-size: 0.95rem;
    }

    .hero {
      padding: 5rem 0 4rem;
      display: grid;
      grid-template-columns: 1.4fr 0.8fr;
      gap: 2rem;
</html>
